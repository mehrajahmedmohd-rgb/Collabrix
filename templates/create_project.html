<!DOCTYPE html>
<html>
<head>
<title>Create Project</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Poppins,sans-serif;
background:linear-gradient(to right,#0f172a,#1e293b);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* BOX */
.box{
background:#1e293b;
padding:35px;
border-radius:15px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

h2{
margin-top:0;
text-align:center;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
outline:none;
background:#0f172a;
color:white;
}

/* SELECT (Priority) */
select{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
outline:none;
background:#0f172a;
color:white;
font-size:14px;
}

/* BUTTON */
button{
width:100%;
margin-top:20px;
padding:12px;
border:none;
background:#38bdf8;
color:white;
font-weight:bold;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0ea5e9;
}

/* BACK LINK */
.back{
display:block;
margin-top:15px;
text-align:center;
color:#38bdf8;
text-decoration:none;
}

.back:hover{
color:#0ea5e9;
}
</style>

</head>

<body>

<div class="box">

<h2>🚀 Create Project</h2>

<form method="POST">

<input type="text"
name="project_name"
placeholder="Project Name"
required>

<!-- ⭐ PRIORITY DROPDOWN (CORRECT PLACE) -->
<select name="priority" required>
    <option value="Low">Low</option>
    <option value="Medium" selected>Medium</option>
    <option value="High">High</option>
</select>

<button type="submit">Create Project</button>

</form>

<a href="/team/{{ team_id }}" class="back">
← Back to Team
</a>

</div>

</body>
</html>
