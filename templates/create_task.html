<!DOCTYPE html><html>
<head>
<title>Create Task</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>

body{
margin:0;
font-family:Poppins, sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* MAIN BOX */
.box{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
padding:35px;
border-radius:20px;
width:340px;
text-align:center;
box-shadow:0 12px 30px rgba(0,0,0,0.4);
animation:fadeIn 0.6s ease;
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

h2{
margin-bottom:20px;
}

/* INPUT + SELECT */
input, select{
width:100%;
padding:12px;
border:none;
border-radius:10px;
outline:none;
margin-top:12px;
font-size:15px;
background:#0f172a;
color:white;
}

/* BUTTON */
button{
width:100%;
margin-top:20px;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#38bdf8,#0ea5e9);
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(56,189,248,0.4);
}

/* LABEL */
.label{
text-align:left;
margin-top:10px;
font-size:13px;
color:#94a3b8;
}

</style></head><body><div class="box"><h2>📋 Create Task</h2><form method="POST"><!-- TASK NAME --><div class="label">Task Name</div>
<input type="text" name="task_name" placeholder="Enter task..." required><!-- ASSIGN MEMBER --><div class="label">Assign To</div>
<select name="assigned_to" required>
<option value="">Select Member</option>{% for m in members %}

<option value="{{ m[0] }}">{{ m[0] }}</option>
{% endfor %}</select><!-- DUE DATE --><div class="label">Due Date</div>
<input type="date" name="due_date"><!-- BUTTON --><button type="submit">Add Task 🚀</button>

</form></div></body>
</html>
