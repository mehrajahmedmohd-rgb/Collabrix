<!DOCTYPE html>
<html>
<head>

<title>Team Activity</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Poppins,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(15,23,42,0.8);
backdrop-filter:blur(10px);
}

.back{
background:#38bdf8;
padding:10px 15px;
border-radius:8px;
color:white;
text-decoration:none;
}

/* CONTAINER */

.container{
max-width:800px;
margin:auto;
padding:40px;
}

/* ACTIVITY CARD */

.activity-card{
background:rgba(255,255,255,0.05);
border-radius:14px;
padding:18px;
margin-bottom:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
border:1px solid rgba(255,255,255,0.08);
transition:0.3s;
}

.activity-card:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(56,189,248,0.2);
}

.user{
font-weight:bold;
color:#38bdf8;
}

.time{
font-size:12px;
color:#94a3b8;
margin-top:5px;
}

</style>

</head>

<body>

<div class="navbar">

<h2>📊 Team Activity</h2>

<a href="/dashboard" class="back">
← Back to Dashboard
</a>

</div>

<div class="container">

{% for a in activities %}

<div class="activity-card">

<span class="user">{{ a[0] }}</span>
{{ a[1] }}

<div class="time">
{{ a[2] }}
</div>

</div>

{% endfor %}

</div>

</body>
</html>
