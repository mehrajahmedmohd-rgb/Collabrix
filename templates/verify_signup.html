<!DOCTYPE html>
<html>
<head>
<title>Verify OTP - Collabrix</title>

<style>

body{
margin:0;
font-family:Poppins, sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.verify-box{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
padding:40px;
border-radius:18px;
width:350px;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
text-align:center;
animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.verify-box h2{
margin-bottom:10px;
}

.verify-box p{
color:#94a3b8;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#0f172a;
color:white;
outline:none;
margin-bottom:15px;
text-align:center;
font-size:16px;
letter-spacing:2px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#38bdf8;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0ea5e9;
transform:translateY(-2px);
}

.logo{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
color:#38bdf8;
}

</style>

</head>

<body>

<div class="verify-box">

<div class="logo">Collabrix</div>

<h2>Email Verification</h2>

<p>Enter the 6-digit code sent to your email</p>
{% if error %}
<p style="
color:#ef4444;
background:#1e293b;
padding:10px;
border-radius:8px;
margin-bottom:15px;
text-align:center;
">
{{ error }}
</p>
{% endif %}

<form method="POST">

<input type="text" name="otp" placeholder="Enter OTP" required>

<button type="submit">Verify OTP</button>

</form>

</div>

</body>
</html>
