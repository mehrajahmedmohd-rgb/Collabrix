<!DOCTYPE html>
<html>
<head>
<title>Access Denied</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Poppins, sans-serif;
background:linear-gradient(to right,#0f172a,#1e293b);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#1e293b;
padding:40px;
border-radius:15px;
text-align:center;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

h2{
margin-top:0;
color:#ef4444;
}

p{
color:#cbd5e1;
margin-top:10px;
}

.btn{
display:inline-block;
margin-top:20px;
padding:10px 18px;
background:#38bdf8;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:600;
transition:0.3s;
}

.btn:hover{
background:#0ea5e9;
transform:translateY(-2px);
}
</style>

</head>

<body>

<div class="box">
<h2>⛔ Access Denied</h2>
<p>
Only the team leader can delete this team.
</p>

<a href="/dashboard" class="btn">← Back to Dashboard</a>
</div>

</body>
</html>
