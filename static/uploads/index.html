<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CSE-B Class Website (Attendance)</title>
  <style>
    body{font-family:Arial, sans-serif;margin:0;padding:0;background:#f9fafb}
    header{background:#0f62fe;color:#fff;padding:15px;text-align:center}
    .container{max-width:1000px;margin:auto;padding:20px}
    .card{background:#fff;padding:15px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1);margin-bottom:15px}
    .students-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
    .student{display:flex;justify-content:space-between;align-items:center;border:1px solid #e5e7eb;padding:10px;border-radius:8px}
    .name{font-weight:bold}
    select{padding:4px;border-radius:6px}
    .controls{margin-top:10px;display:flex;gap:10px;flex-wrap:wrap}
    button{padding:8px 12px;border:none;border-radius:6px;cursor:pointer}
    .primary{background:#0f62fe;color:white}
    .ghost{background:#fff;border:1px solid #0f62fe;color:#0f62fe}
    footer{text-align:center;color:#6b7280;font-size:14px;margin-top:20px}
  </style>
</head>
<body>
  <header>
    <h1>CSE - B (Engineering) — 2025 Batch</h1>
    <p>Class Leader: <strong>Mohd Mehraj Ahmed Siddique</strong> (Roll: 160925733126) | Total Students: 64</p>
  </header>

  <main class="container">
    <div class="card">
      <h2>Students & Attendance</h2>
      <div id="students" class="students-grid"></div>
      <div class="controls">
        <button id="save" class="primary">Save Attendance</button>
        <button id="export-csv" class="ghost">Export CSV</button>
        <button id="reset" class="ghost">Reset</button>
      </div>
    </div>
  </main>

  <footer>
    Made for CSE-B · Attendance records are saved locally in your browser
  </footer>

  <script>
    // Roll numbers
    const START_ROLL = 160925733065;   // corrected to 12 digits
    const END_ROLL   = 160925733128;   // last roll number
    const LEADER_ROLL = 160925733126;
    const LEADER_NAME = "Mohd Mehraj Ahmed Siddique";

    // Create student list
    function mkInitialStudents(){
      const arr=[];
      for(let roll=START_ROLL; roll<=END_ROLL; roll++){
        arr.push({
          roll:String(roll),
          name:(roll===LEADER_ROLL ? LEADER_NAME : `Student ${roll}`),
          attendance:"Present"
        });
      }
      return arr;
    }

    let students = mkInitialStudents();
    const studentsEl=document.getElementById('students');

    // Render students on page
    function render(list){
      studentsEl.innerHTML="";
      list.forEach((s,idx)=>{
        const div=document.createElement('div');
        div.className="student";
        div.innerHTML=`
          <div>
            <div class="name" contenteditable="true" data-idx="${idx}">${s.name}</div>
            <div>Roll: ${s.roll}</div>
          </div>
          <div>
            <select data-idx="${idx}">
              <option value="Present" ${s.attendance==="Present"?"selected":""}>Present</option>
              <option value="Absent" ${s.attendance==="Absent"?"selected":""}>Absent</option>
            </select>
          </div>
        `;
        studentsEl.appendChild(div);
      });
    }

    // Handle attendance change
    studentsEl.addEventListener("change",(e)=>{
      if(e.target.tagName==="SELECT"){
        const idx=e.target.dataset.idx;
        students[idx].attendance=e.target.value;
        saveLocal();
      }
    });

    // Handle name edit
    studentsEl.addEventListener("focusout",(e)=>{
      if(e.target.classList.contains("name")){
        const idx=e.target.dataset.idx;
        students[idx].name=e.target.textContent.trim() || `Student ${students[idx].roll}`;
        saveLocal();
      }
    });

    // Save to local storage
    function saveLocal(){
      localStorage.setItem("cseb_attendance",JSON.stringify(students));
    }

    // Save button
    document.getElementById("save").addEventListener("click",()=>{
      saveLocal();
      alert("Attendance saved in your browser!");
    });

    // Export CSV
    document.getElementById("export-csv").addEventListener("click",()=>{
      const rows=[["Roll","Name","Attendance"]];
      students.forEach(s=>rows.push([s.roll, `"${s.name}"`, s.attendance])); // wrapped names in quotes
      const csv=rows.map(r=>r.join(",")).join("\n");
      const blob=new Blob([csv],{type:"text/csv"});
      const a=document.createElement("a");
      a.href=URL.createObjectURL(blob);
      a.download="CSEB-Attendance.csv";
      a.click();
    });

    // Reset button
    document.getElementById("reset").addEventListener("click",()=>{
      if(confirm("Reset all attendance?")){
        students=mkInitialStudents();
        saveLocal();
        render(students);
      }
    });

    // Load saved data
    (function load(){
      const saved=localStorage.getItem("cseb_attendance");
      if(saved){students=JSON.parse(saved);}
      render(students);
    })();
  </script>
</body>
</html>
